<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Knowledge Graph Mastere{% endblock %}</title>
    
    <!-- Load Static and Tailwind tags together -->
    {% load static tailwind_tags %}
    
    <!-- Tailwind CSS (compiled via django-tailwind) -->
    {% tailwind_css %}
    
    <!-- Local JS Libraries -->
    <script defer src="{% static 'vendor/alpine.min.js' %}"></script>
    <script src="{% static 'vendor/htmx.min.js' %}"></script>
    <script src="{% static 'vendor/force-graph.min.js' %}"></script>

    <!-- Custom Fintech-inspired Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<!-- hx-headers injects the CSRF token into ALL HTMX POST/PUT requests globally -->
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex flex-col" hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>

    <!-- Global Navigation -->
    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="{% url 'core_index' %}" class="flex-shrink-0 flex items-center gap-2">
                        <span class="font-bold text-xl tracking-tight text-blue-800">KGM</span>
                    </a>
                    <div class="hidden md:flex space-x-6">
                        <a href="{% url 'core_index' %}" class="text-slate-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Ingest</a>
                        <a href="{% url 'graph:index' %}" class="text-slate-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Graph</a>
                        <a href="{% url 'chat:chat_interface' %}" class="text-slate-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium transition-colors">Chat</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Injection -->
    <main class="flex-grow w-full mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-1">
        {% block content %}{% endblock %}
    </main>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
